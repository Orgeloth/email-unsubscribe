<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Email Unsubscribe Manager</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script>
    (function() {
      const t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches))
        document.documentElement.classList.add('dark');
    })();
  </script>
  <style>
    main { max-width: 960px; margin: 28px auto; padding: 0 24px; }

    /* Tabs */
    .tabs {
      display: flex; gap: 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 22px;
    }
    .tab {
      padding: 9px 18px; cursor: pointer;
      font-size: 13.5px; font-weight: 500;
      color: var(--text-2); border: none; background: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color var(--transition), border-color var(--transition);
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text-1); }

    .section { display: none; }
    .section.active { display: block; }

    /* Add user form */
    .add-form {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 18px 20px;
      margin-bottom: 16px;
      display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
      box-shadow: var(--shadow-sm);
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 220px; }
    .form-label {
      font-size: 11px; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: .06em;
    }
    .checkbox-row {
      display: flex; align-items: center; gap: 7px;
      font-size: 13.5px; color: var(--text-2);
      padding-bottom: 8px; cursor: pointer;
    }
    .checkbox-row input { cursor: pointer; accent-color: var(--accent); width: 15px; height: 15px; }

    /* Table extras */
    .user-name { display: flex; align-items: center; gap: 8px; }
    .avatar {
      width: 26px; height: 26px; border-radius: 50%;
      object-fit: cover; border: 1.5px solid var(--border); flex-shrink: 0;
    }
    .avatar-initials {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; flex-shrink: 0;
    }
    .name-text { font-size: 13.5px; font-weight: 500; }
    .name-pending { font-size: 13px; color: var(--text-3); font-style: italic; }

    .action-btns { display: flex; gap: 5px; flex-wrap: wrap; }

    .meta-line { font-size: 13px; color: var(--text-3); margin-bottom: 10px; }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="header-brand">
      <svg class="header-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="none">
        <defs>
          <linearGradient id="ag" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
        <rect width="48" height="48" rx="11" fill="url(#ag)"/>
        <rect x="8" y="15" width="28" height="19" rx="2.5" stroke="white" stroke-width="2" stroke-opacity="0.9"/>
        <path d="M8 18L22 27L36 18" stroke="white" stroke-width="2" stroke-linejoin="round" stroke-opacity="0.9"/>
        <path d="M30 22L39 13" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M34.5 13H39V17.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>Admin Panel</h1>
    </div>
    <div class="header-right">
      <a href="/app" class="btn btn-ghost btn-sm">← App</a>
      <a href="/help" class="btn btn-ghost btn-sm">Help</a>
      <button class="theme-toggle" onclick="toggleDark()" title="Toggle dark mode">
        <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun"  width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
    </div>
  </header>

  <main>
    <div id="error-banner" class="alert alert-error" style="display:none"></div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('users')">Users</button>
      <button class="tab" onclick="showTab('sessions')">Active Sessions</button>
      <button class="tab" onclick="showTab('history')">Unsubscribe History</button>
    </div>

    <!-- Users -->
    <div id="tab-users" class="section active">
      <div class="add-form">
        <div class="form-group">
          <label class="form-label">Add user by email</label>
          <input type="email" id="new-email" placeholder="user@gmail.com">
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="new-is-admin">
          <label for="new-is-admin">Admin</label>
        </div>
        <button class="btn btn-primary" id="add-btn" onclick="addUser()">Add User</button>
      </div>

      <p class="meta-line" id="users-meta"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Status</th>
              <th>Added</th>
              <th>Last Login</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Unsubscribe History -->
    <div id="tab-history" class="section">
      <p class="meta-line" id="history-meta"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Domain</th>
              <th>Sender</th>
              <th>Last Unsubscribed</th>
              <th style="text-align:center">Times</th>
            </tr>
          </thead>
          <tbody id="history-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Sessions -->
    <div id="tab-sessions" class="section">
      <p class="meta-line" id="sessions-meta"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Created</th>
              <th>Expires</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="sessions-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    let currentTab = 'users';
    let csrfToken = '';

    function toggleDark() {
      const dark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }

    function showTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach((t, i) =>
        t.classList.toggle('active', ['users','sessions','history'][i] === tab));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      if (tab === 'sessions') loadSessions();
      if (tab === 'history') loadHistory();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function showError(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = msg; el.style.display = msg ? 'block' : 'none';
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function fmtTs(ts) {
      if (!ts) return '—';
      return new Date(ts * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Users ────────────────────────────────────────────────────────────────
    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      if (!res.ok) { showError('Failed to load users'); return; }
      const { users } = await res.json();
      document.getElementById('users-meta').textContent =
        `${users.length} user${users.length !== 1 ? 's' : ''}`;
      const tbody = document.getElementById('users-tbody');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-3)">No users yet. Add one above.</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => {
        const initials = ((u.firstName?.[0]||'')+(u.lastName?.[0]||'')).toUpperCase() || (u.email[0]||'?').toUpperCase();
        const avatar = u.picture
          ? `<img src="${esc(u.picture)}" class="avatar" referrerpolicy="no-referrer">`
          : `<span class="avatar-initials">${initials}</span>`;
        const name = [u.firstName, u.lastName].filter(Boolean).join(' ');
        const nameHtml = name
          ? `<span class="name-text">${esc(name)}</span>`
          : `<span class="name-pending">Pending login</span>`;
        const adminBadge = u.isAdmin ? `<span class="badge badge-admin">Admin</span>` : '';
        const statusBadge = u.status === 'active'
          ? `<span class="badge badge-active">Active</span>`
          : `<span class="badge badge-disabled">Disabled</span>`;
        return `
          <tr>
            <td><div class="user-name">${avatar}${nameHtml}${adminBadge}</div></td>
            <td style="font-size:13px;color:var(--text-2)">${esc(u.email)}</td>
            <td>${statusBadge}</td>
            <td style="font-size:12.5px;color:var(--text-3)">${fmtDate(u.addedAt)}</td>
            <td style="font-size:12.5px;color:var(--text-3)">${fmtDate(u.lastLoginAt)}</td>
            <td>
              <div class="action-btns">
                <button class="btn btn-ghost btn-sm" onclick="toggleStatus('${esc(u.email)}','${u.status}')">
                  ${u.status === 'active' ? 'Disable' : 'Enable'}
                </button>
                <button class="btn btn-ghost btn-sm" onclick="toggleAdmin('${esc(u.email)}',${u.isAdmin})">
                  ${u.isAdmin ? 'Remove Admin' : 'Make Admin'}
                </button>
                <button class="btn btn-danger btn-sm" onclick="removeUser('${esc(u.email)}')">Remove</button>
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    async function addUser() {
      const email = document.getElementById('new-email').value.trim();
      const isAdmin = document.getElementById('new-is-admin').checked;
      if (!email) return;
      showError('');
      document.getElementById('add-btn').disabled = true;
      const res = await fetch('/api/admin/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
        body: JSON.stringify({ email, isAdmin }),
      });
      document.getElementById('add-btn').disabled = false;
      if (!res.ok) { const d = await res.json(); showError(d.error || 'Failed to add user'); return; }
      document.getElementById('new-email').value = '';
      document.getElementById('new-is-admin').checked = false;
      showToast(`${email} added`);
      loadUsers();
    }

    async function toggleStatus(email, current) {
      const res = await fetch(`/api/admin/users/${encodeURIComponent(email)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
        body: JSON.stringify({ status: current === 'active' ? 'disabled' : 'active' }),
      });
      if (!res.ok) { showError('Failed to update status'); return; }
      showToast(`${email} ${current === 'active' ? 'disabled' : 'enabled'}`);
      loadUsers();
    }

    async function toggleAdmin(email, isAdmin) {
      const res = await fetch(`/api/admin/users/${encodeURIComponent(email)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
        body: JSON.stringify({ isAdmin: !isAdmin }),
      });
      if (!res.ok) { showError('Failed to update admin status'); return; }
      showToast(`Admin ${isAdmin ? 'removed from' : 'granted to'} ${email}`);
      loadUsers();
    }

    async function removeUser(email) {
      if (!confirm(`Remove ${email} from the allowlist?`)) return;
      const res = await fetch(`/api/admin/users/${encodeURIComponent(email)}`, {
        method: 'DELETE', headers: { 'X-CSRF-Token': csrfToken },
      });
      if (!res.ok) { showError('Failed to remove user'); return; }
      showToast(`${email} removed`);
      loadUsers();
    }

    // ── Sessions ─────────────────────────────────────────────────────────────
    async function loadSessions() {
      const res = await fetch('/api/admin/sessions');
      if (!res.ok) { showError('Failed to load sessions'); return; }
      const { sessions } = await res.json();
      document.getElementById('sessions-meta').textContent =
        `${sessions.length} active session${sessions.length !== 1 ? 's' : ''}`;
      const tbody = document.getElementById('sessions-tbody');
      if (!sessions.length) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-3)">No active sessions.</td></tr>';
        return;
      }
      tbody.innerHTML = sessions.map(s => `
        <tr>
          <td style="font-size:13px">${esc(s.email)}</td>
          <td style="font-size:12.5px;color:var(--text-3)">${fmtTs(s.createdAt)}</td>
          <td style="font-size:12.5px;color:var(--text-3)">${fmtTs(s.expiresAt)}</td>
          <td><button class="btn btn-danger btn-sm" onclick="invalidateSession('${esc(s.sessionId)}')">Invalidate</button></td>
        </tr>
      `).join('');
    }

    // ── History ───────────────────────────────────────────────────────────────
    async function loadHistory() {
      const res = await fetch('/api/admin/history');
      if (!res.ok) { showError('Failed to load history'); return; }
      const { history } = await res.json();
      document.getElementById('history-meta').textContent =
        `${history.length} unsubscribe action${history.length !== 1 ? 's' : ''} across all users`;
      const tbody = document.getElementById('history-tbody');
      if (!history.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-3)">No unsubscribe actions yet.</td></tr>';
        return;
      }
      tbody.innerHTML = history.map(h => `
        <tr>
          <td style="font-size:13px;color:var(--text-2)">${esc(h.userEmail)}</td>
          <td style="font-size:13.5px;font-weight:500">${esc(h.domain)}</td>
          <td style="font-size:13px;color:var(--text-2)">${esc(h.senderEmail || '—')}</td>
          <td style="font-size:12.5px;color:var(--text-3)">${fmtDate(h.unsubscribedAt)}</td>
          <td style="font-size:12.5px;color:var(--text-3);text-align:center">${h.count || 1}</td>
        </tr>`).join('');
    }

    async function invalidateSession(sid) {
      if (!confirm('Sign this user out?')) return;
      const res = await fetch(`/api/admin/sessions/${encodeURIComponent(sid)}`, {
        method: 'DELETE', headers: { 'X-CSRF-Token': csrfToken },
      });
      if (!res.ok) { showError('Failed to invalidate session'); return; }
      showToast('Session invalidated');
      loadSessions();
    }

    async function logout() {
      await fetch('/auth/logout', { method: 'POST', headers: { 'X-CSRF-Token': csrfToken } });
      window.location.href = '/';
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    async function init() {
      const res = await fetch('/auth/status');
      const data = await res.json();
      if (!data.authenticated || !data.user?.isAdmin) return window.location.href = '/';
      csrfToken = data.csrfToken;
      loadUsers();
    }

    init();
  </script>
</body>
</html>
