<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script>
    (function() {
      const t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches))
        document.documentElement.classList.add('dark');
    })();
  </script>
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .card {
      max-width: 380px; width: 100%;
      padding: 44px 36px; text-align: center;
    }
    .icon-wrap {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--danger-muted);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; letter-spacing: -.01em; }
    p  { font-size: 14px; color: var(--text-2); line-height: 1.6; }
    .back-link {
      display: inline-block; margin-top: 24px;
      font-size: 13.5px; color: var(--accent); text-decoration: none; font-weight: 500;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1 id="title">Access Denied</h1>
    <p id="message">Your account is not authorized to use this app. Please contact the administrator.</p>
    <a href="/" class="back-link">← Back to sign in</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('reason') === 'disabled') {
      document.getElementById('title').textContent = 'Account Disabled';
      document.getElementById('message').textContent = 'Your account has been disabled. Please contact the administrator.';
    }
  </script>
</body>
</html>
