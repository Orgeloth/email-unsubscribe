<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="26" fill="url(#bg-grad)"/>
  <!-- Subtle top shine -->
  <rect width="120" height="120" rx="26" fill="url(#shine)"/>

  <!-- Envelope body -->
  <rect x="18" y="36" width="70" height="50" rx="6" stroke="white" stroke-width="5" stroke-opacity="0.95"/>
  <!-- Envelope flap / V line -->
  <path d="M18 45L53 67L88 45" stroke="white" stroke-width="5" stroke-linejoin="round" stroke-opacity="0.95"/>

  <!-- Arrow (unsubscribe / exit indicator) -->
  <path d="M76 54L97 33" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <path d="M86 33H97V44" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
